<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blog | Xin TIAN</title>
<style>
  :root {
    --bg: #fafbfc;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #555;
    --text-light: #888;
    --accent: #2c3e6b;
    --accent-light: #e8edf5;
    --border: #e0e4e8;
    --radius: 6px;
    --sidebar-width: 280px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    font-size: 15px;
  }

  .layout { display: flex; min-height: 100vh; }

  .topnav { display: none; background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 0 24px; }
  .topnav-inner { display: flex; gap: 0; }
  .topnav a {
    padding: 14px 20px; font-size: 14px; font-weight: 500;
    color: var(--text-secondary); text-decoration: none;
    border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
  }
  .topnav a.active, .topnav a:hover { color: var(--accent); border-bottom-color: var(--accent); }

  .sidebar {
    width: var(--sidebar-width); min-width: var(--sidebar-width);
    background: var(--card-bg); border-right: 1px solid var(--border);
    padding: 48px 28px 40px; display: flex; flex-direction: column;
    align-items: center; text-align: center;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }

  .sidebar-photo {
    width: 140px; height: 140px; border-radius: 50%;
    object-fit: cover; border: 3px solid var(--accent-light);
    margin-bottom: 20px; background: #e8edf5;
  }

  .sidebar-name { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: 0.3px; margin-bottom: 4px; }
  .sidebar-title { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  .sidebar-affiliation { font-size: 12.5px; color: var(--text-light); line-height: 1.5; margin-bottom: 20px; }

  .sidebar-divider { width: 40px; height: 2px; background: var(--accent); opacity: 0.3; border-radius: 1px; margin: 0 auto 18px; }

  .sidebar-nav { display: flex; flex-direction: column; gap: 4px; width: 100%; margin-bottom: 10px; }
  .sidebar-nav a {
    padding: 7px 12px; font-size: 13.5px; font-weight: 500;
    color: var(--text-secondary); text-decoration: none;
    border-radius: var(--radius); transition: background 0.15s, color 0.15s;
  }
  .sidebar-nav a.active, .sidebar-nav a:hover { background: var(--accent-light); color: var(--accent); }

  .sidebar-links { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .sidebar-link {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 9px 16px; background: var(--accent-light); color: var(--accent);
    border-radius: var(--radius); text-decoration: none; font-size: 13.5px;
    font-weight: 500; transition: background 0.2s, transform 0.15s;
  }
  .sidebar-link:hover { background: #d0d9ea; transform: translateY(-1px); }
  .sidebar-link svg { width: 16px; height: 16px; flex-shrink: 0; }

  .main { flex: 1; padding: 48px 52px 60px; max-width: 780px; }

  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-light); margin-bottom: 20px; font-weight: 600;
  }

  .blog-empty {
    text-align: center;
    padding: 80px 0;
    color: var(--text-light);
  }

  .blog-empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
  .blog-empty h3 { font-size: 17px; color: var(--text-secondary); margin-bottom: 8px; }
  .blog-empty p { font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.6; }

  .blog-list { display: flex; flex-direction: column; gap: 24px; }

  .blog-post {
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .blog-post:last-child { border-bottom: none; }

  .blog-post-date {
    font-size: 12px; color: var(--text-light); margin-bottom: 4px;
  }
  .blog-post-title {
    font-size: 16px; font-weight: 600; color: var(--text);
    margin-bottom: 6px; text-decoration: none;
  }
  .blog-post-title:hover { color: var(--accent); }
  .blog-post-excerpt {
    font-size: 13.5px; color: var(--text-secondary); line-height: 1.6;
  }

  .footer {
    margin-top: 52px; padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 12.5px; color: var(--text-light);
  }

  @media (max-width: 860px) {
    .topnav { display: flex; }
    .sidebar-nav { display: none; }
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%; min-width: 100%; height: auto; position: static;
      padding: 32px 24px 28px; border-right: none; border-bottom: 1px solid var(--border);
    }
    .sidebar-photo { width: 100px; height: 100px; }
    .main { padding: 32px 24px 40px; }
  }
</style>
</head>
