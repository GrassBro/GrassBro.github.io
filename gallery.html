<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gallery | Xin TIAN</title>
<style>
  :root {
    --bg: #f9f8f6;
    --card-bg: #ffffff;
    --text: #1a1a24;
    --text-secondary: #555;
    --text-light: #8a8a8a;
    --accent: #1e3a5f;
    --accent-light: #ecf0f4;
    --accent-glow: #34669e;
    --border: #eae7e2;
    --radius: 8px;
    --radius-sm: 5px;
    --sidebar-width: 286px;
    --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    --font-display: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.68;
    font-size: 15px;
    letter-spacing: -0.01em;
  }

  .layout { display: flex; min-height: 100vh; justify-content: center; }

  .topnav { display: none; background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 0 24px; backdrop-filter: blur(8px); }
  .topnav-inner { display: flex; gap: 0; }
  .topnav a {
    padding: 14px 20px; font-size: 14px; font-weight: 500;
    color: var(--text-secondary); text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .topnav a.active, .topnav a:hover { color: var(--accent); border-bottom-color: var(--accent); }

  .sidebar {
    width: var(--sidebar-width); min-width: var(--sidebar-width);
    background: var(--card-bg); border-right: 1px solid var(--border);
    padding: 52px 30px 44px; display: flex; flex-direction: column;
    align-items: center; text-align: center;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }

  .sidebar-photo-wrap { position: relative; margin-bottom: 22px; }
  .sidebar-photo {
    width: 136px; height: 136px; border-radius: 50%;
    object-fit: cover; display: block;
    box-shadow: 0 2px 12px rgba(30, 58, 95, 0.12);
    transition: box-shadow 0.3s, transform 0.3s;
  }
  .sidebar-photo:hover {
    box-shadow: 0 4px 20px rgba(30, 58, 95, 0.2);
    transform: scale(1.03);
  }

  .sidebar-name { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; margin-bottom: 3px; }
  .sidebar-title { font-size: 13px; color: var(--text-light); font-weight: 500; margin-bottom: 4px; letter-spacing: 0.2px; }
  .sidebar-affiliation { font-size: 12.5px; color: var(--text-light); line-height: 1.55; margin-bottom: 22px; }

  .sidebar-divider { width: 32px; height: 3px; background: linear-gradient(90deg, var(--accent) 0%, var(--accent-glow) 100%); border-radius: 2px; margin: 0 auto 20px; }

  .sidebar-nav { display: flex; flex-direction: column; gap: 2px; width: 100%; margin-bottom: 12px; }
  .sidebar-nav a {
    padding: 8px 14px; font-size: 13.5px; font-weight: 500;
    color: var(--text-secondary); text-decoration: none;
    border-radius: var(--radius-sm); transition: background 0.2s, color 0.2s; letter-spacing: 0.1px;
  }
  .sidebar-nav a.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .sidebar-nav a:hover { background: #e2e8f0; color: var(--accent); }

  .sidebar-links { display: flex; flex-direction: column; gap: 6px; width: 100%; }
  .sidebar-link {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 9px 14px; background: var(--accent-light); color: var(--accent);
    border-radius: var(--radius-sm); text-decoration: none; font-size: 13px;
    font-weight: 500; letter-spacing: 0.1px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .sidebar-link:hover { background: #dce4f0; transform: translateY(-1px); box-shadow: 0 2px 6px rgba(30, 58, 95, 0.08); }
  .sidebar-link svg { width: 15px; height: 15px; flex-shrink: 0; }

  .main { flex: 0 1 820px; padding: 52px 56px 72px; width: 820px; }

  .gallery-category { margin-bottom: 52px; }

  .category-header { margin-bottom: 18px; }

  .category-title {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
    letter-spacing: -0.2px;
  }

  .category-desc { font-size: 13px; color: var(--text-light); letter-spacing: 0.1px; }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .gallery-item {
    position: relative;
    background: var(--accent-light);
    border-radius: var(--radius);
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-light);
    font-size: 13px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .gallery-item:hover {
    transform: scale(1.025);
    box-shadow: 0 4px 16px rgba(30, 58, 95, 0.1);
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .gallery-caption {
    padding: 9px 2px 2px;
    font-size: 12.5px;
    color: var(--text-light);
    line-height: 1.4;
    text-align: center;
    letter-spacing: 0.1px;
  }

  .gallery-item.empty { min-height: 120px; }
  .gallery-item.empty svg { width: 32px; height: 32px; opacity: 0.2; }

  .footer { margin-top: 60px; padding-top: 22px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-light); letter-spacing: 0.2px; }

  @media (max-width: 920px) {
    .topnav { display: flex; }
    .sidebar-nav { display: none; }
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%; min-width: 100%; height: auto; position: static;
      padding: 36px 24px 32px; border-right: none; border-bottom: 1px solid var(--border);
    }
    .sidebar-photo { width: 100px; height: 100px; }
    .main { padding: 36px 28px 48px; flex: 1; width: auto; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    .sidebar-divider { display: none; }
  }

  @media (max-width: 500px) {
    .gallery-grid { grid-template-columns: 1fr; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="index.html">Home</a>
    <a href="gallery.html" class="active">Gallery</a>
    <a href="blog.html">Blog</a>
  </div>
</nav>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-photo-wrap">
      <img class="sidebar-photo" src="images/photo.jpg" alt="Xin TIAN" width="136" height="136" loading="eager">
    </div>
    <h1 class="sidebar-name">Xin TIAN</h1>
    <div class="sidebar-title">Senior Researcher</div>
    <div class="sidebar-affiliation">Huawei Hisilicon</div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-nav">
      <a href="index.html">Home</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="blog.html">Blog</a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-links">
      <a class="sidebar-link" href="https://scholar.google.com/citations?user=Ru6BvE4AAAAJ&hl=en" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 4 3 6 3s6-1 6-3v-5"/></svg>
        Google Scholar
      </a>
      <a class="sidebar-link" href="https://github.com/GrassBro" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        GitHub
      </a>
      <a class="sidebar-link" href="mailto:xin.tian.831@gmail.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
        Email
      </a>
    </div>
  </aside>

  <main class="main" id="gallery-content">
    <div style="text-align:center;padding:100px 0;color:var(--text-light);">Loading gallery...</div>
  </main>

</div>

<script>
(function() {
  var main = document.getElementById('gallery-content');
  var categories = [
    { id: 'scenery', title: 'Scenery', desc: 'Landscapes, cityscapes, and places I have visited', showCaption: true }
  ];

  function filenameToCaption(f) {
    return f.replace(/\.[^.]+$/,'').replace(/[_-]/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
  }

  function emptyBlock() {
    return '<div><div class="gallery-item empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div></div>';
  }

  function imageBlock(path, fname, showCap) {
    var h = '<div><div class="gallery-item"><img src="'+path+'/'+fname+'" alt="" loading="lazy"></div>';
    if (showCap) h += '<div class="gallery-caption">'+filenameToCaption(fname)+'</div>';
    h += '</div>';
    return h;
  }

  function render(manifest) {
    var html = '';
    categories.forEach(function(cat) {
      var images = manifest[cat.id] || [];
      html += '<section class="gallery-category">';
      html += '<div class="category-header"><h2 class="category-title">'+cat.title+'</h2>';
      html += '<p class="category-desc">'+cat.desc+'</p></div>';
      html += '<div class="gallery-grid">';
      if (images.length===0) { html += emptyBlock()+emptyBlock()+emptyBlock(); }
      else {
        var bp = 'images/'+cat.id;
        images.forEach(function(img){ html += imageBlock(bp, img, cat.showCaption); });
      }
      html += '</div></section>';
    });
    html += '<div class="footer">&copy; 2026 Xin TIAN.</div>';
    main.innerHTML = html;
  }

  fetch('images/manifest.json')
    .then(function(r){ if(!r.ok) throw Error; return r.json(); })
    .then(render)
    .catch(function(){
      main.innerHTML='<div style="text-align:center;padding:100px 0;color:var(--text-light);"><p>Unable to load gallery.</p><p style="font-size:13px;margin-top:8px;">Run <code>python update_gallery.py</code> then refresh.</p></div>';
    });
})();
</script>

</body>
